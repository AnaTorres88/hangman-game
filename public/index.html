<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Game - Dark Neon Edition</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <h1>HANGMAN</h1>
        
        <div id="instructions">Guess the word letter by letter. You have 6 attempts to guess the word.</div>
        
        <div id="word-display"></div>
        
        <div id="stats">
            <div class="stat-item">
                <span class="label">Score:</span>
                <span id="score">0</span>
            </div>
            <div class="stat-item">
                <span class="label">Attempts:</span>
                <span id="attempts">6</span>
            </div>
        </div>
        
        <div id="keyboard"></div>
        
        <div id="message"></div>
        
        <button id="restart-btn">Play Again</button>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
