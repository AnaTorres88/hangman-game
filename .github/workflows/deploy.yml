name: CI and trigger CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (CI Step)
        run: npm install

      - name: Simulate Tests
        run: echo "✅ CI passed"

      - name: Trigger Termux deploy (CD Step)
        env:
          NGROK_URL: ${{ secrets.NGROK_URL }}
        run: |
          curl -X POST "$NGROK_URL/deploy"
